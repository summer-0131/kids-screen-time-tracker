<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Screen Time Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Fredoka', sans-serif;
    background: linear-gradient(135deg,#dfe9ff,#fceaff);
    padding: 10px;
    margin: 0;
}
h1 {
    text-align: center;
    margin-bottom: 5px;
}
#date {
    text-align: center;
    font-size: 18px;
    margin-bottom: 15px;
}
.container {
    display: flex;
    gap: 10px;
}
.child {
    flex: 1;
    background: #fff;
    padding: 12px;
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.name {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 5px;
}
.avatar {
    text-align: center;
    margin-bottom: 5px;
    font-size: 28px;
}
.big-score {
    font-size: 30px;
    font-weight: bold;
    text-align: center;
    color: #ff4d6d;
    margin-bottom: 5px;
}
.daily-score {
    text-align: center;
    color: #0077cc;
    margin-bottom: 10px;
}
.last-week {
    font-size: 14px;
    text-align: center;
    color: #ff9900;
    margin-bottom: 10px;
}
.behavior {
    margin-bottom: 10px;
}
.label {
    font-size: 14px;
    margin-bottom: 5px;
}
.buttons {
    display: flex;
    gap: 5px;
}
button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
}
.done { background: #6bd66b; color: white; }
.notdone { background: #ddd; }
.correct { background: #4da6ff; color: white; }
.reminder { background: #ffb347; color: white; }
.homework { background: #ffa6c9; color: white; }
.tooltip { position: relative; display: inline-block; }
.tooltip .tooltiptext {
    visibility: hidden;
    width: 220px;
    background-color: #333;
    color: #fff;
    text-align: left;
    border-radius: 6px;
    padding: 8px;
    position: absolute;
    z-index: 1;
    bottom: 125%;
    left: 50%;
    margin-left: -110px;
    opacity: 0;
    transition: opacity 0.3s;
    font-size: 12px;
}
.tooltip:hover .tooltiptext { visibility: visible; opacity: 1; }
@media(max-width:600px){ .container{flex-direction:column;} }
</style>
</head>
<body>

<h1>🌟 Screen Time Tracker 🌟</h1>
<div id="date"></div>
<div class="container" id="app"></div>

<script>
// ================= 数据 & 配置 =================
const base = 0; // 初始屏幕时间
 { name: "FanFan", emoji: '<img src="fanfan.png" width="50">' },
  { name: "YouYou", emoji: '<img src="youyou.png" width="50">' }
];

const behaviors = [
    {name:"Breakfast", type:"normal", summary:"Eat breakfast independently"},
    {name:"Exercise", type:"normal", summary:"Complete daily exercise independently"},
    {name:"Shower", type:"normal", summary:"Take a shower on time independently"},
    {name:"Sleep", type:"normal", summary:"Go to bed on time independently"},
    {name:"Homework", type:"normal", summary:"Complete 15 minutes of homework"}, // ✅ 改为 normal
    {name:"Emotion", type:"emotion", summary:"Handle emotions appropriately",
        tooltip: {
            "Correct":"Stayed calm and solved the problem using kind words, listening, or finding a solution.",
            "Reminder":"Needed a reminder, but was able to calm down and handle the situation.",
            "Not":"Could not control emotions even after reminders."
        }
    }
];

// ================= 日期逻辑 =================
function getMonday(d){
    let date = new Date(d);
    let day = date.getDay();
    let diff = (day===0? -6:1) - day;
    date.setDate(date.getDate() + diff);
    return date.toISOString().split('T')[0];
}

const todayDate = new Date();
const options = { year: 'numeric', month: 'long', day: 'numeric' };
const today = todayDate.toISOString().split('T')[0];
const week = getMonday(todayDate);

// 显示日期和本周周一
document.getElementById("date").innerHTML = `
Today: ${todayDate.toLocaleDateString('en-US', options)} <br>
Week starts: ${new Date(week).toLocaleDateString('en-US', options)}
`;

// ================= 数据存储 =================
let data = JSON.parse(localStorage.getItem("data"))||{};
if(!data[week]) data[week]={};
kids.forEach(k=>{
    if(!data[week][k.name]) data[week][k.name]={};
    if(!data[week][k.name][today]){
        data[week][k.name][today]={};
        behaviors.forEach(b=>{
            data[week][k.name][today][b.name]="Not";
        });
    }
});

// ================= 计算分数 =================
function calcDay(k){
    let total = 0;
    behaviors.forEach(b=>{
        let s = data[week][k][today][b.name];
        if(b.type==="normal"){
            if(s==="Done") total+=3;
            if(s==="Reminder") total+=1; // ✅ 新增
        }
        if(b.type==="emotion"){
            if(s==="Correct") total+=5;
            if(s==="Reminder") total+=3;
        }
    });
    return total;
}

function calcWeek(k, w=week){
    let t = base;
    if(!data[w] || !data[w][k]) return t;
    Object.values(data[w][k]).forEach(day=>{
        behaviors.forEach(b=>{
            let s = day[b.name];
            if(b.type==="normal"){
                if(s==="Done") t+=3;
                if(s==="Reminder") t+=1; // ✅ 新增
            }
            if(b.type==="emotion"){
                if(s==="Correct") t+=5;
                if(s==="Reminder") t+=3;
            }
        });
    });
    return t;
}

function getLastWeek(){
    let date = new Date();
    date.setDate(date.getDate()-7);
    return getMonday(date);
}

// ================= 渲染页面 =================
function render(){
    let html = "";
    const lastWeek = getLastWeek();

    kids.forEach(k=>{
        let dayScore = calcDay(k.name);
        let weekTotal = calcWeek(k.name);
        let lastWeekTotal = calcWeek(k.name, lastWeek);

        html += `
        <div class="child">
            <div class="avatar">${k.emoji}</div>
            <div class="name">${k.name}</div>
            <div class="last-week">Last Week: ${lastWeekTotal} min</div>
            <div class="big-score">${weekTotal} min</div>
            <div class="daily-score">Today: ${dayScore} min</div>
        `;

        behaviors.forEach(b=>{
            html += `<div class="behavior">`;
            if(b.type==="emotion"){
                html += `<div class="label tooltip">${b.name} (${b.summary})
                    <span class="tooltiptext">
                        Correct: ${b.tooltip["Correct"]}<br>
                        Reminder: ${b.tooltip["Reminder"]}<br>
                        Not: ${b.tooltip["Not"]}
                    </span>
                </div>`;
                html += `<div class="buttons">`;
                html += btn(k.name,b.name,"Correct","correct");
                html += btn(k.name,b.name,"Reminder","reminder");
                html += btn(k.name,b.name,"Not","notdone");
                html += `</div>`;
            } else { // ✅ 普通行为包括 Homework
                html += `<div class="label">${b.summary}</div>`;
                html += `<div class="buttons">`;
                html += btn(k.name,b.name,"Done","done");
                html += btn(k.name,b.name,"Reminder","reminder"); // ✅ 新增按钮
                html += btn(k.name,b.name,"Not","notdone");
                html += `</div>`;
            }
            html += `</div>`;
        });

        html += `</div>`;
    });

    document.getElementById("app").innerHTML = html;
}

function btn(k,b,val,cls){
    let current = data[week][k][today][b];
    let active = (current===val) ? "style='opacity:1'" : "style='opacity:0.4'";
    return `<button class="${cls}" ${active} onclick="setVal('${k}','${b}','${val}')">${val}</button>`;
}

function setVal(k,b,v){
    data[week][k][today][b] = v;
    localStorage.setItem("data",JSON.stringify(data));
    render();
}

// ================= 初始渲染 =================
render();
</script>
</body>
</html>
